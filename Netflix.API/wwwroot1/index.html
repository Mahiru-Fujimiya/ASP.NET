<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lawwy Netflix - Anime World</title>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        /* Navbar và Thanh tìm kiếm */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #e50914;
            font-size: 2.5rem;
            margin: 0;
        }

        .search-controls {
            display: flex;
            gap: 15px;
        }

        #search-input {
            background: rgba(0,0,0,0.75);
            color: white;
            border: 1px solid #666;
            padding: 10px 15px;
            border-radius: 4px;
            width: 250px;
            outline: none;
        }

            #search-input:focus {
                border-color: #e50914;
            }

        #genre-filter {
            background: #000;
            color: white;
            border: 1px solid #666;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Grid phim */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background: #181818;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

            .movie-card:hover {
                transform: scale(1.05);
                box-shadow: 0 10px 20px rgba(0,0,0,0.6);
                z-index: 5;
                border: 1px solid #fff;
            }

            .movie-card img {
                width: 100%;
                height: 320px;
                object-fit: cover;
            }

        .movie-info {
            padding: 12px;
            font-weight: bold;
            text-align: center;
        }

        /* Modal Player */
        #player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 85%;
            max-width: 1000px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: -45px;
            right: 0;
            color: white;
            font-size: 24px;
            cursor: pointer;
            background: #e50914;
            padding: 5px 15px;
            border-radius: 4px;
        }

        iframe {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.5);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>NETFLIX <span style="font-weight: 100; color: #fff;">ANIME</span></h1>

        <div class="search-controls">
            <input type="text" id="search-input" placeholder="Tìm tên phim..." oninput="filterMovies()">

            <select id="genre-filter" onchange="filterMovies()">
                <option value="all">Tất cả thể loại</option>
                <option value="1">Hành Động</option>
                <option value="2">Phiêu Lưu</option>
                <option value="4">Chuyển Sinh (Isekai)</option>
            </select>
        </div>
    </div>

    <div class="movie-grid" id="movie-list"></div>

    <div id="player-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePlayer()">ĐÓNG &times;</span>
            <div id="video-container"></div>
        </div>
    </div>

    <div class="header-container">
        <h1>NETFLIX <span style="font-weight: 100; color: #fff;">ANIME</span></h1>

        <div class="search-controls">
            <input type="text" id="search-input" placeholder="Tìm tên phim..." oninput="filterMovies()">
            <button id="login-btn" onclick="location.href='login.html'"
                    style="background:#e50914; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">
                Đăng nhập
            </button>
        </div>
    </div>

    <script>
        const API_MOVIE = 'https://localhost:7062/api/Movie';
        const API_EPISODE = 'https://localhost:7062/api/Episode/movie';

        let allMovies = []; // Nơi lưu trữ tạm danh sách gốc để lọc

        // 1. Load danh sách phim từ API
        async function loadMovies() {
            try {
                const res = await fetch(API_MOVIE);
                allMovies = await res.json();
                renderMovies(allMovies);
            } catch (err) {
                console.error("Lỗi kết nối:", err);
            }
        }

        // Hàm vẽ phim ra màn hình
        function renderMovies(movies) {
            const list = document.getElementById('movie-list');
            list.innerHTML = movies.map(m => `
                <div class="movie-card">
                    <img src="${m.poster}" alt="${m.title}" onclick="playMovie(${m.id})">
                    <div class="movie-info">
                        <span>${m.title}</span>
                        <button onclick="addToFavorite(${m.id})" style="background:none; border:none; color:#e50914; font-size:20px; cursor:pointer;">❤️</button>
                    </div>
                </div>
            `).join('');
        }

        // 2. Logic Tìm kiếm và Lọc
        function filterMovies() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const genreId = document.getElementById('genre-filter').value;

            const filtered = allMovies.filter(m => {
                const matchesName = m.title.toLowerCase().includes(keyword);
                const matchesGenre = (genreId === "all") || (m.genreId == genreId);
                return matchesName && matchesGenre;
            });

            renderMovies(filtered);
        }

        // 3. Chạy phim
        async function playMovie(movieId) {
            try {
                const res = await fetch(`${API_EPISODE}/${movieId}`);
                const episodes = await res.json();

                if (episodes.length > 0) {
                    const videoUrl = episodes[0].videoUrl;
                    // Chuyển link youtube thường sang link embed nếu cần
                    const embedUrl = videoUrl.replace("watch?v=", "embed/");

                    document.getElementById('video-container').innerHTML = `
                                <iframe src="${embedUrl}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                            `;
                    document.getElementById('player-modal').style.display = 'flex';
                } else {
                    alert("Phim này chưa có tập nào!");
                }
            } catch (err) { alert("Lỗi lấy tập phim!"); }
        }

        async function addToFavorite(movieId) {
            // Giả sử chúng ta lấy UserId từ localStorage sau khi đăng nhập thành công
            const username = localStorage.getItem('username');
            if (!username) {
                alert("Phúc ơi, bạn phải Đăng nhập mới thả tim được chứ!");
                window.location.href = 'login.html';
                return;
            }

            // Ở đây mình gọi API để lưu vào bảng Favorites
            const res = await fetch('https://localhost:7062/api/Favorite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: 1, // Tạm thời để ID của LawwyPhuc là 1
                    movieId: movieId
                })
            });

            if (res.ok) {
                alert("Đã thêm vào danh sách yêu thích của Lawwy! ❤️");
            } else {
                alert("Phim này bạn đã thích rồi mà!");
            }
        }


        function closePlayer() {
            document.getElementById('player-modal').style.display = 'none';
            document.getElementById('video-container').innerHTML = '';
        }

        loadMovies();
    </script>
</body>
</html>
