<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawwyFlix | Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14b8/afdb162e-8367-4275-8012-79017772c72b/VN-vi-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: rgba(0, 0, 0, 0.75);
            padding: 50px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .auth-card h2 { font-weight: 700; margin-bottom: 30px; }
        
        .form-control {
            background: rgba(51, 51, 51, 0.8) !important;
            border: 1px solid transparent;
            color: white !important;
            padding: 12px 15px;
            border-radius: 4px;
        }
        .form-control:focus { background: #444 !important; box-shadow: none; border: 1px solid var(--primary-color); }

        .btn-brand { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="position-absolute top-0 start-0 p-4">
        <a href="/index.html" class="text-decoration-none">
            <h2 class="text-primary-brand fw-bold" style="letter-spacing:-1px;">LAWWYFLIX</h2>
        </a>
    </div>

    <div class="auth-card">
        <h2>Đăng Ký</h2>
        <div id="status-msg" class="alert d-none py-2"></div>

        <form id="register-form">
            <div class="mb-3">
                <input type="text" id="reg-user" class="form-control" placeholder="Tên tài khoản (Username)" required>
            </div>
            <div class="mb-3">
                <input type="email" id="reg-email" class="form-control" placeholder="Địa chỉ Email" required>
            </div>
            <div class="mb-3">
                <input type="password" id="reg-pass" class="form-control" placeholder="Mật khẩu" required>
            </div>
            <div class="mb-4">
                <input type="password" id="reg-confirm" class="form-control" placeholder="Xác nhận mật khẩu" required>
            </div>

            <button type="submit" class="btn-brand">Đăng ký ngay</button>
        </form>

        <div class="mt-4 text-muted text-center">
            Đã có tài khoản? <a href="/login.html" class="text-white fw-bold">Đăng nhập ngay.</a>
        </div>
        <div class="mt-4 text-center">
            <a href="/index.html" class="text-muted fs-6"><i class="fas fa-home me-1"></i> Quay về Trang chủ</a>
        </div>
    </div>

    <script>
        const API_BASE = "/api";

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('status-msg');
            const user = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (pass !== confirm) {
                showMsg("Mật khẩu xác nhận không khớp!", "danger");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email: email, password: pass })
                });

                if (res.ok) {
                    showMsg("Đăng ký thành công! Đang chuyển hướng...", "success");
                    setTimeout(() => location.href = "/login.html", 2000);
                } else {
                    const error = await res.json();
                    showMsg(error.message || "Có lỗi xảy ra, Boss thử lại nhé!", "danger");
                }
            } catch (err) {
                showMsg("Không thể kết nối API!", "danger");
            }
        };

        function showMsg(text, type) {
            const msgBox = document.getElementById('status-msg');
            msgBox.innerText = text;
            msgBox.className = `alert alert-${type} py-2`;
            msgBox.classList.remove('d-none');
        }
    </script>
</body>
</html>
