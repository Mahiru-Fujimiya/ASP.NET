<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawwyFlix | Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #e50914;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14b8/afdb162e-8367-4275-8012-79017772c72b/VN-vi-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.75);
            padding: 60px 68px 40px;
            width: 450px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

            .login-card h1 {
                color: white;
                font-weight: bold;
                margin-bottom: 28px;
            }

        .form-control {
            background: #333;
            border: none;
            color: white;
            padding: 12px;
            margin-bottom: 16px;
        }

            .form-control:focus {
                background: #454545;
                color: white;
                box-shadow: none;
                border: none;
            }

        .btn-login {
            background: var(--netflix-red);
            border: none;
            color: white;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 24px;
        }

            .btn-login:hover {
                background: #b20710;
            }

        .help-text {
            color: #b3b3b3;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .signup-now {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

            .signup-now:hover {
                underline;
            }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Đăng nhập</h1>
        <div id="alert-box" class="alert alert-danger d-none"></div>

        <form id="login-form">
            <input type="text" id="username" class="form-control" placeholder="Tên đăng nhập hoặc Email" required>
            <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>

            <button type="submit" class="btn btn-login">Đăng nhập</button>

            <div class="help-text">
                <label><input type="checkbox" checked> Ghi nhớ tôi</label>
                <a href="#" class="text-decoration-none text-secondary">Bạn cần trợ giúp?</a>
            </div>
        </form>

        <div class="mt-5">
            <span style="color: #737373;">Bạn mới tham gia LawwyFlix?</span>
            <a href="/register.html" class="signup-now">Đăng ký ngay.</a>
        </div>
    </div>

    <script>
        const API_BASE = "https://localhost:7254/api";

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Đang xử lý...";

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    // 🔑 Lưu Token vào LocalStorage để dùng cho các trang sau
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result));

                    // Chuyển hướng về trang chủ
                    location.href = "/index.html";
                } else {
                    const alertBox = document.getElementById('alert-box');
                    alertBox.innerText = result.message || "Sai tên đăng nhập hoặc mật khẩu!";
                    alertBox.classList.remove('d-none');
                    btn.innerText = "Đăng nhập";
                }
            } catch (err) {
                console.error("Lỗi login:", err);
            }
        };
    </script>
</body>
</html>
