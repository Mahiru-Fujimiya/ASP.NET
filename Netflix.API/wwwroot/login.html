<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawwyFlix | Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14b8/afdb162e-8367-4275-8012-79017772c72b/VN-vi-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: rgba(0, 0, 0, 0.75);
            padding: 50px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .auth-card h2 { font-weight: 700; margin-bottom: 30px; }
        
        .form-control {
            background: rgba(51, 51, 51, 0.8) !important;
            border: 1px solid transparent;
            color: white !important;
            padding: 12px 15px;
            border-radius: 4px;
        }
        .form-control:focus { background: #444 !important; box-shadow: none; border: 1px solid var(--primary-color); }

        .btn-brand { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="position-absolute top-0 start-0 p-4">
        <a href="/index.html" class="text-decoration-none">
            <h2 class="text-primary-brand fw-bold" style="letter-spacing:-1px;">LAWWYFLIX</h2>
        </a>
    </div>

    <div class="auth-card">
        <h2>Đăng Nhập</h2>
        <div id="alert-box" class="alert alert-danger d-none py-2"></div>

        <form id="login-form">
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Tên đăng nhập hoặc Email" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
            </div>

            <button type="submit" class="btn-brand mt-4">Đăng Nhập</button>
        </form>

        <div class="mt-4 text-muted text-center">
            Mới tham gia LawwyFlix? <a href="/register.html" class="text-white fw-bold">Đăng ký ngay.</a>
        </div>
        <div class="mt-4 text-center">
            <a href="/index.html" class="text-muted fs-6"><i class="fas fa-home me-1"></i> Quay về Trang chủ</a>
        </div>
    </div>

    <script>
        const API_BASE = "/api";

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Đang xử lý...";

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result));
                    location.href = "/index.html";
                } else {
                    const alertBox = document.getElementById('alert-box');
                    alertBox.innerText = result.message || "Sai tên đăng nhập hoặc mật khẩu!";
                    alertBox.classList.remove('d-none');
                    btn.innerText = "Đăng Nhập";
                }
            } catch (err) {
                console.error("Lỗi login:", err);
            }
        };
    </script>
</body>
</html>
